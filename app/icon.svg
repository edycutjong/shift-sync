<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5" />
      <stop offset="100%" stop-color="#7C3AED" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#bg-grad)"/>
  
  <g filter="url(#glow)">
    <!-- Right side node -->
    <rect x="300" y="216" width="80" height="80" rx="20" fill="none" stroke="#FFFFFF" stroke-width="32"/>
    <!-- Left side node -->
    <rect x="132" y="216" width="80" height="80" rx="20" fill="none" stroke="#FFFFFF" stroke-width="32"/>
    <!-- Connecting line with an arrow inside -->
    <path d="M 172 256 L 340 256" stroke="#FFFFFF" stroke-width="32" stroke-linecap="round"/>
    <path d="M 280 196 L 340 256 L 280 316" fill="none" stroke="#FFFFFF" stroke-width="32" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
